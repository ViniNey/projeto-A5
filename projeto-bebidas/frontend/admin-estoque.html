<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estoque</title>
<link rel="stylesheet" href="css/admin-estoque.css">
</head>
<body>
<div class="card">
  <div class="topbar">
    <h2>📦 Controle de Estoque</h2>
    <button onclick="location.href='admin.html'" class="botaomenu">⬅ Menu</button>
  </div>

  <div id="estoque"></div>
  <button class="salvar-geral" onclick="salvarTodos()">
    Salvar alterações
  </button>
</div>

<!-- ===================== -->
<!-- MODAL PERSONALIZADO -->
<!-- ===================== -->

<div id="modalCustom" class="modal-custom">

  <div class="modal-box">

    <p id="modalTexto"></p>

    <div id="modalInputs"></div>

    <div class="modal-botoes">

      <button
        id="btnCancelarModal"
        class="btn-cancelar-modal"
      >
        Cancelar
      </button>

      <button
        id="btnConfirmarModal"
        class="btn-confirmar-modal"
      >
        Confirmar
      </button>

    </div>

  </div>

</div>

<script type="module">
  import { db } from "./firebase.js";

  import { registrarLog } from "./registrarLog.js";

  import {
    collection,
    getDocs,
    updateDoc,
    doc
  } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

  const usuarioLogado =
    localStorage.getItem(
      'usuarioEmail'
    );

  const isAdmin =
    localStorage.getItem(
      'isAdmin'
    );

  if(
    !usuarioLogado ||
    isAdmin !== 'true'
  ){
    window.location.href =
      'login.html';
  }

// =====================
// MODAL PERSONALIZADO
// =====================

function abrirModalCustom({
  texto = '',
  mostrarCancelar = true,
  html = '',
  confirmarTexto = 'Confirmar'
}){

  return new Promise((resolve) => {

    const modal =
      document.getElementById('modalCustom');

    const textoEl =
      document.getElementById('modalTexto');

    const inputs =
      document.getElementById('modalInputs');

    const btnCancelar =
      document.getElementById('btnCancelarModal');

    const btnConfirmar =
      document.getElementById('btnConfirmarModal');

    textoEl.innerHTML = texto;

    inputs.innerHTML = html;

    btnConfirmar.textContent =
      confirmarTexto;

    btnCancelar.style.display =
      mostrarCancelar
      ? 'block'
      : 'none';

    modal.style.display = 'flex';

    btnCancelar.onclick = () => {

      modal.style.display = 'none';

      resolve(null);
    };

    btnConfirmar.onclick = () => {

      modal.style.display = 'none';

      resolve({
        confirmado: true,
        inputs: inputs
      });
    };
  });
}

async function carregar(){

  const snapshot = await getDocs(
    collection(db, "products")
  );

  const div =
    document.getElementById('estoque');

  div.innerHTML = '';

  // =====================
  // ARRAY PRODUTOS
  // =====================

  const produtos = [];

  snapshot.forEach((documento) => {

    produtos.push({
      id: documento.id,
      ...documento.data()
    });
  });

  // =====================
  // ORDEM IGUAL ADMIN
  // =====================

  produtos.sort((a, b) => {

    return (a.ordem || 0) -
           (b.ordem || 0);
  });

  // =====================
  // RENDERIZAR
  // =====================

  produtos.forEach((p) => {

    if (p.exclusaoPermanente) {
      return;
    }

    div.innerHTML += `

      <div class="pcard">

        <b class="npc">
          ${p.nome}
        </b>

        <input
          id="e${p.id}"
          type="number"
          value="${p.estoque || 0}"
          data-id="${p.id}"
          data-original="${p.estoque || 0}"
        >

      </div>
    `;
  });
}

async function salvarTodos(){

  const inputs =
    document.querySelectorAll('#estoque input');

  let alterouAlgo = false;

  for (const input of inputs) {

    const id = input.dataset.id;

    const valorNovo =
      Number(input.value);

    const valorAntigo =
      Number(input.dataset.original || 0);

    if(valorNovo < 0){

      mostrarToast(
        'O estoque não pode ser negativo',
        'erro'
      );

      input.focus();

      return;
    }

      if(valorNovo === valorAntigo){
        continue;
      }

    alterouAlgo = true;

    // =====================
    // BUSCAR VALOR ANTIGO
    // =====================

    const produtoAtual =
      [...document.querySelectorAll('.pcard')]
      .find(card =>
        card.querySelector('input').dataset.id === id
      );

    const nomeProduto =
      produtoAtual
        ?.querySelector('.npc')
        ?.textContent || 'Produto';

    // =====================
    // ATUALIZAR FIREBASE
    // =====================

    await updateDoc(
      doc(db, "products", id),
      {
        estoque: valorNovo
      }
      
    );

    input.dataset.original = valorNovo;

    // =====================
    // REGISTRAR LOG
    // =====================

    await registrarLog(
      'ALTEROU ESTOQUE',
      `${nomeProduto}: estoque alterado de ${valorAntigo} para ${valorNovo}`
    );
  }

  if(alterouAlgo){

    mostrarToast(
      'Alterações salvas com sucesso',
      'sucesso'
    );

  }else{

    mostrarToast(
      'Nenhuma alteração encontrada',
      'erro'
    );
  }
}

  function mostrarToast(
    mensagem,
    tipo = 'sucesso'
  ){

    const container =
      document.getElementById(
        'toastContainer'
      );

    const toast =
      document.createElement('div');

    toast.className =
      `toast ${tipo}`;

    toast.textContent =
      mensagem;

    container.appendChild(toast);

    setTimeout(() => {

      toast.style.opacity = '0';

      toast.style.transform =
        'translateX(30px)';

      toast.style.transition =
        '.25s';

      setTimeout(() => {
        toast.remove();
      }, 250);

    }, 3000);
  }

  // =====================
  // APERTAR ENTER (SALVAR TUDO)
  // =====================
  document.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      const ativo = document.activeElement;

      // só dispara se o foco estiver em um input do estoque
      if (ativo && ativo.closest('#estoque')) {
        e.preventDefault();
        salvarTodos();
      }
    }
  });

  carregar();
  window.salvarTodos = salvarTodos;
</script>
<div id="toastContainer" class="toast-container"></div>
</body>
</html>
