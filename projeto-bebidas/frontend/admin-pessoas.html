<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin - Pessoas</title>
<link rel="stylesheet" href="css/admin-pessoas.css">
</head>
<body>
<div class="ccard">
  <div class="topbar">
    <h2>👤 Pessoas</h2>
    <button onclick="location.href='admin.html'" class="botaomenu">⬅ Menu</button>
  </div>

  <div class="admin-container">

    <div class="col-esquerda">

      <div class="filters">
        <input id="nome" placeholder="Buscar nome">
        <input id="inicio" type="date">
        <input id="fim" type="date">
        <button onclick="carregar()">Filtrar</button>
      </div>

      <div id="lista"></div>

    </div>
  </div>
</div>

<div id="modalCustom" class="modal-custom">

  <div class="modal-box">

    <p id="modalTexto"></p>

    <div id="modalInputs"></div>

    <div class="modal-botoes">

      <button
        id="btnCancelarModal"
        class="btn-cancelar-modal"
      >
        Cancelar
      </button>

      <button
        id="btnConfirmarModal"
        class="btn-confirmar-modal"
      >
        Confirmar
      </button>

    </div>

  </div>

</div>

<script type="module">
import { db } from "./firebase.js";

import { registrarLog } from "./registrarLog.js";

import {
  collection,
  getDocs,
  deleteDoc,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const usuarioLogado =
  localStorage.getItem(
    'usuarioEmail'
  );

const isAdmin =
  localStorage.getItem(
    'isAdmin'
  );

if(
  !usuarioLogado ||
  isAdmin !== 'true'
){
  window.location.href =
    'login.html';
}

const hoje = new Date();
document.getElementById('inicio').value =
  hoje.getFullYear() + "-" + String(hoje.getMonth()+1).padStart(2,'0') + "-01";
document.getElementById('fim').value = hoje.toISOString().slice(0,10);

function aplicarMascaraMoeda(input){

  input.addEventListener('input', ()=>{

    let v =
      input.value.replace(/\D/g,'');

    if(v === ''){
      v = '0';
    }

    v =
      (parseInt(v) / 100)
      .toFixed(2);

    v = v
      .replace('.', ',')
      .replace(
        /\B(?=(\d{3})+(?!\d))/g,
        '.'
      );

    input.value = 'R$ ' + v;
  });
}

function moedaParaNumero(v){

  return Number(
    v
      .replace('R$','')
      .replace(/\./g,'')
      .replace(',','.')
  );
}

function formatarNome(email){
  const antesDoArroba =
    email.split('@')[0];

  return antesDoArroba
    .split('.')
    .map(p =>
      p.charAt(0).toUpperCase() +
      p.slice(1).toLowerCase()
    )
    .join(' ');
}

function toggle(el){
  const c = el.nextElementSibling;
  const aberto = c.style.display === 'block';
  c.style.display = aberto ? 'none' : 'block';
  el.querySelector('.arrow').textContent = aberto ? '▶' : '▼';
}

// =====================
// MODAL PERSONALIZADO
// =====================

function abrirModalCustom({
  texto = '',
  mostrarCancelar = true,
  html = '',
  confirmarTexto = 'Confirmar'
}){

  return new Promise((resolve) => {

    const modal =
      document.getElementById('modalCustom');

    const textoEl =
      document.getElementById('modalTexto');

    const inputs =
      document.getElementById('modalInputs');

    const btnCancelar =
      document.getElementById('btnCancelarModal');

    const btnConfirmar =
      document.getElementById('btnConfirmarModal');

    textoEl.innerHTML = texto;

    inputs.innerHTML = html;

    btnConfirmar.textContent =
      confirmarTexto;

    btnCancelar.style.display =
      mostrarCancelar
      ? 'block'
      : 'none';

    modal.style.display = 'flex';

    const inputPreco =
      document.getElementById('editPreco');

    if(inputPreco){

      aplicarMascaraMoeda(inputPreco);
    }

    btnCancelar.onclick = () => {

      modal.style.display = 'none';

      resolve(null);
    };

    btnConfirmar.onclick = () => {

      modal.style.display = 'none';

      resolve({
        confirmado: true,
        inputs: inputs
      });
    };
  });
}

async function carregar(){

  const lista =
    document.getElementById('lista');

  // SALVAR SCROLL
  const scrollAtual =
    document.querySelector('.ccard')
    .scrollTop;

  // SALVAR CARDS ABERTOS
  const cardsAbertos = [];

  document
    .querySelectorAll('.content')
    .forEach(content => {

      if(content.style.display === 'block'){

        const email =
          content.dataset.email;

        if(email){
          cardsAbertos.push(email);
        }
      }
    });

  // CRIA HTML TEMPORÁRIO
  const temp = document.createElement('div');

  const nomeFiltro =
    document.getElementById('nome')
    .value
    .toLowerCase();

  const inicio =
    document.getElementById('inicio').value;

  const fim =
    document.getElementById('fim').value;

  const snapshot = await getDocs(
    collection(db, "consumptions")
  );

  const agrupados = {};

  snapshot.forEach((documento) => {

    const d = {
      id: documento.id,
      ...documento.data()
    };

    const partes =
      d.data.split('-');

    const dataConsumo =
      new Date(
        partes[0],
        partes[1] - 1,
        partes[2]
      );

    if (inicio) {

      const partesInicio =
        inicio.split('-');

      const dataInicio =
        new Date(
          partesInicio[0],
          partesInicio[1] - 1,
          partesInicio[2]
        );

      if (dataConsumo < dataInicio) {
        return;
      }
    }

    if (fim) {

      const partesFim =
        fim.split('-');

      const dataFim =
        new Date(
          partesFim[0],
          partesFim[1] - 1,
          partesFim[2],
          23,
          59,
          59,
          999
        );

      if (dataConsumo > dataFim) {
        return;
      }
    }

    if (
      nomeFiltro &&
      !d.email.toLowerCase()
      .includes(nomeFiltro)
    ){
      return;
    }

    if (!agrupados[d.email]) {

      agrupados[d.email] = {
        nome: d.nome || d.email,
        total: 0,
        itens: []
      };
    }

    agrupados[d.email].total +=
      Number(d.preco) *
      Number(d.quantidade);

    agrupados[d.email].itens.push(d);
  });

  Object.entries(agrupados)

  .sort((a, b) => {

    const nomeA =
      formatarNome(a[1].nome);

    const nomeB =
      formatarNome(b[1].nome);

    return nomeA.localeCompare(
      nomeB,
      'pt-BR'
    );
  })

  .forEach(([email, p]) => {

    const card =
      document.createElement('div');

    card.className = 'card';

    card.innerHTML = `
      <div class="header"
        onclick="toggle(this)">

        <span class="arrow">▶</span>

        <span class="name">
          ${formatarNome(p.nome)}
        </span>

        <span class="badge">
          R$ ${p.total
            .toFixed(2)
            .replace('.', ',')}
        </span>
      </div>

      <div class="content" data-email="${email}">
        <table class="table">
          <tbody></tbody>
        </table>
      </div>
    `;

    temp.appendChild(card);

    const content =
      card.querySelector('.content');

    // REABRIR CARD
    if(cardsAbertos.includes(email)){

      content.style.display = 'block';

      card.querySelector('.arrow')
        .textContent = '▼';
    }

    const tbody =
      card.querySelector('tbody');

    const agrupadosProdutos = {};

    p.itens.forEach((d) => {

      const partes =
        d.data.split('-');

      const data =
        new Date(
          partes[0],
          partes[1] - 1,
          partes[2]
        ).toLocaleDateString('pt-BR');

      const chave =
        d.produto + '_' +
        data + '_' +
        d.email;

      if (!agrupadosProdutos[chave]) {

        agrupadosProdutos[chave] = {
          ...d,
          quantidade: 0,
          ids: []
        };
      }

      agrupadosProdutos[chave]
        .quantidade +=
          Number(d.quantidade);

      agrupadosProdutos[chave]
        .ids.push(d.id);
    });

    Object.values(agrupadosProdutos)

    .sort((a, b) => {

      const pa =
        a.data.split('-');

      const pb =
        b.data.split('-');

      const dataA =
        new Date(pa[0], pa[1]-1, pa[2]);

      const dataB =
        new Date(pb[0], pb[1]-1, pb[2]);

      if(dataA.getTime() !== dataB.getTime()){

        return dataB - dataA;
      }

      return a.produto.localeCompare(
        b.produto,
        'pt-BR'
      );
    })

    .forEach((d) => {

      tbody.innerHTML += `
        <tr>

          <td>
            ${d.produto}
          </td>

          <td>
            ${d.quantidade}x
          </td>

          <td>
            R$ ${Number(d.preco)
              .toFixed(2)
              .replace('.', ',')}
          </td>

          <td>
            ${
              (() => {

                const partes =
                  d.data.split('-');

                return new Date(
                  partes[0],
                  partes[1]-1,
                  partes[2]
                ).toLocaleDateString('pt-BR');

              })()
            }
          </td>

          <td class="acao">

            <button
              class="btn-editar"
              onclick='editarLancamentos(${JSON.stringify(d.ids)})'>
              ✏️
            </button>

            <button
              class="btn-excluir"
              onclick='excluirLancamento(${JSON.stringify(d.ids)})'>
              ❌
            </button>

          </td>

        </tr>
      `;
    });
  });

  // ATUALIZA TUDO DE UMA VEZ
  lista.replaceChildren(...temp.children);

  // RESTAURA SCROLL
  requestAnimationFrame(() => {

    document.querySelector('.ccard')
      .scrollTop = scrollAtual;
  });
}

async function editarLancamentos(ids){

  try{

    const primeiroRef =
      doc(db, "consumptions", ids[0]);

    const primeiroSnap =
      await getDoc(primeiroRef);

    if(!primeiroSnap.exists()){

      await abrirModalCustom({
        texto: 'Registro não encontrado',
        mostrarCancelar: false,
        confirmarTexto: 'OK'
      });

      return;
    }

    const consumo =
      primeiroSnap.data();

    // SOMAR QUANTIDADE TOTAL
    let quantidadeTotal = 0;

    for(const id of ids){

      const snap =
        await getDoc(
          doc(db, "consumptions", id)
        );

      if(snap.exists()){

        quantidadeTotal +=
          Number(
            snap.data().quantidade || 0
          );
      }
    }

    const resposta =
      await abrirModalCustom({

        texto: 'Editar lançamento',

        html: `
          <p class="edit">Quantidade</p>
          <input
            id="editQuantidade"
            type="number"
            placeholder="Quantidade"
            value="${quantidadeTotal}"
          >

          <p class="edit">Preço</p>
          <input
            id="editPreco"
            type="text"
            placeholder="Preço"
            value="R$ ${Number(consumo.preco)
              .toFixed(2)
              .replace('.', ',')}"
          >

          <p class="edit">Data</p>
          <input
            id="editData"
            type="date"
            value="${consumo.data?.slice(0,10)}"
          >
        `,

        confirmarTexto: 'Salvar'
      });

    if(!resposta){
      return;
    }

    const novaQuantidade =
      Number(
        document.getElementById('editQuantidade').value
      );

    const novoPreco =
      moedaParaNumero(
        document.getElementById('editPreco').value
      );

    const novaData =
      document.getElementById('editData').value;

    if(
      !novaQuantidade ||
      !novoPreco ||
      !novaData
    ){

      mostrarToast(
        'Preencha todos os campos',
        'erro'
      );

      return;
    }

    // =====================
    // AJUSTAR ESTOQUE
    // =====================

    const diferenca =
      quantidadeTotal - novaQuantidade;

    // DEVOLVE AO ESTOQUE
    if(
      diferenca > 0 &&
      consumo.produtoId
    ){

      const produtoRef =
        doc(
          db,
          "products",
          consumo.produtoId
        );

      const produtoSnap =
        await getDoc(produtoRef);

      if(produtoSnap.exists()){

        const produto =
          produtoSnap.data();

        const estoqueAtual =
          Number(produto.estoque || 0);

        await updateDoc(produtoRef, {

          estoque:
            estoqueAtual + diferenca
        });
      }
    }

    // REMOVE DO ESTOQUE
    if(
      diferenca < 0 &&
      consumo.produtoId
    ){

      const produtoRef =
        doc(
          db,
          "products",
          consumo.produtoId
        );

      const produtoSnap =
        await getDoc(produtoRef);

      if(produtoSnap.exists()){

        const produto =
          produtoSnap.data();

        const estoqueAtual =
          Number(produto.estoque || 0);

        await updateDoc(produtoRef, {

          estoque:
            estoqueAtual - Math.abs(diferenca)
        });
      }
    }

    // CRIA NOVO PRIMEIRO
    await addDoc(
      collection(db, "consumptions"),
      {
        email: consumo.email,
        produto: consumo.produto,
        produtoId: consumo.produtoId,
        quantidade: novaQuantidade,
        preco: novoPreco,
        data: novaData
      }
    );

    // REMOVE OS ANTIGOS
    for(const id of ids){

      await deleteDoc(
        doc(db, "consumptions", id)
      );
    }

    await carregar();

    await registrarLog({

      tipo: 'consumo_editado',

      descricao:
        `Editou lançamento de "${consumo.produto}" de ${consumo.email}`,

      usuario: usuarioLogado
    });

    mostrarToast(
      'Lançamento editado com sucesso'
    );

  }catch(err){

    console.error(err);

    await abrirModalCustom({
      texto: 'Erro ao editar lançamento',
      mostrarCancelar: false,
      confirmarTexto: 'OK'
    });
  }
}

async function excluirLancamento(ids){

  const confirmar =
    await abrirModalCustom({
      texto: 'Excluir este lançamento?'
    });

  if(!confirmar){
    return;
  }

  try {

    // =====================
    // BUSCAR CONSUMO
    // =====================

    const consumoRef =
      doc(db, "consumptions", ids[0]);

    const consumoSnap =
      await getDoc(consumoRef);

    if (!consumoSnap.exists()) {

      mostrarToast(
        'Registro não encontrado',
        'erro'
      );
      return;
    }

    const consumo =
      consumoSnap.data();

    // =====================
    // EXCLUIR CONSUMO
    // =====================

    let quantidadeAtual = 0;

    for(const id of ids){

      const snap =
        await getDoc(
          doc(db, "consumptions", id)
        );

      if(snap.exists()){

        quantidadeAtual +=
          Number(
            snap.data().quantidade || 0
          );
      }
    }

    // =====================
    // ESCOLHER QUANTIDADE
    // =====================

    let quantidadeExcluir = 1;

    if(quantidadeAtual > 1){

    const respostaQtd =
      await abrirModalCustom({

        texto: `
          Quantidade atual:
          <b>${quantidadeAtual}</b><br><br>
          Quantos deseja excluir?
        `,

        html: `
          <input
            id="quantidadeExcluir"
            type="number"
            min="1"
            max="${quantidadeAtual}"
            value="1"
          >
        `,

        confirmarTexto: 'Excluir'
      });

    if(!respostaQtd){
      return;
    }

    quantidadeExcluir =
      Number(
        document.getElementById(
          'quantidadeExcluir'
        ).value
      );

    if(
      !quantidadeExcluir ||
      quantidadeExcluir <= 0
    ){

      mostrarToast(
        'Quantidade inválida',
        'erro'
      );

      return;
    }

      if(
        !quantidadeExcluir ||
        quantidadeExcluir <= 0
      ){
        return;
      }

      if(quantidadeExcluir > quantidadeAtual){

      await abrirModalCustom({
        texto: 'Quantidade inválida',
        mostrarCancelar: false,
        confirmarTexto: 'OK'
      });

        return;
      }
    }

    // =====================
    // DEVOLVER ESTOQUE
    // =====================

    if (consumo.produtoId) {

      const produtoRef =
        doc(
          db,
          "products",
          consumo.produtoId
        );

      const produtoSnap =
        await getDoc(produtoRef);

      if (produtoSnap.exists()) {

        const produto =
          produtoSnap.data();

        const estoqueAtual =
          Number(produto.estoque || 0);

        await updateDoc(produtoRef, {

          estoque:
            estoqueAtual +
            quantidadeExcluir
        });
      }
    }

    // =====================
    // EXCLUIR OU REDUZIR
    // =====================

    let restante = quantidadeExcluir;

    for(const id of ids){

      if(restante <= 0){
        break;
      }

      const ref =
        doc(db, "consumptions", id);

      const snap =
        await getDoc(ref);

      if(!snap.exists()){
        continue;
      }

      const dados = snap.data();

      const qtdDoc =
        Number(dados.quantidade || 0);

      if(restante >= qtdDoc){

        await deleteDoc(ref);

        restante -= qtdDoc;

      }else{

        await updateDoc(ref, {
          quantidade:
            qtdDoc - restante
        });

        restante = 0;
      }
    }

    await carregar();

    await registrarLog({

      tipo: 'consumo_excluido',

      descricao:
        `Excluiu ${quantidadeExcluir}x "${consumo.produto}" de ${consumo.email}`,

      usuario: usuarioLogado
    });

    mostrarToast(
      'Lançamento excluído com sucesso'
    );

  } catch (err) {

    console.error(err);

    mostrarToast(
      'Erro ao excluir lançamento',
      'erro'
    );
  }
}

function mostrarToast(
  mensagem,
  tipo = 'sucesso'
){

  const container =
    document.getElementById(
      'toastContainer'
    );

  const toast = document.createElement('div');

  toast.className = `toast ${tipo}`;

  toast.innerHTML = mensagem;

  container.appendChild(toast);

  setTimeout(() => {

    toast.style.opacity = '0';

    toast.style.transform =
      'translateX(30px)';

    toast.style.transition =
      '.25s';

    setTimeout(() => {
      toast.remove();
    }, 250);
  }, 3000);
}

// =====================
// APERTAR ENTER
// =====================
document.getElementById('nome').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    carregar();
  }
});

// =====================
// DATA PICKER
// =====================
document.querySelectorAll('input[type="date"]').forEach(input => {

  input.addEventListener('click', () => {

    if(input.showPicker){
      input.showPicker();
    }
  });
});

carregar();
window.toggle = toggle;
window.carregar = carregar;
window.excluirLancamento = excluirLancamento;
window.editarLancamentos = editarLancamentos;
</script>
<div id="toastContainer" class="toast-container"></div>
</body>
</html>
