<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="css/index.css">

<style>

body{
  margin:0;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:"Segoe UI", Arial, sans-serif;

  background-image:url("imagens/logo-nova.png");
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;

  background-color:#0C0C0B;
}

.menu-container{

  display:flex;
  flex-direction:column;
  align-items:center;
}

.menu-container h1{

  margin:0 0 30px 0;

  padding:5px 10px;

  background:#0A0A09;

  border-radius:14px;

  color:white;

  font-size:35px;
  font-weight:700;

  text-align:center;

  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.cort{
  color:white;
  margin-bottom:30px;
  text-align: center;
}

.card-login{
  background:white;
  padding:30px;
  border-radius:12px;
  width:340px;

  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
  width:100%;
  height:46px;

  padding:0 12px;
  box-sizing:border-box;

  border-radius:8px;
  border:1px solid #ccc;

  font-size:15px;
}

button{
  width:100%;
  height:46px;

  margin-top:15px;

  border:none;
  border-radius:8px;

  background:#383836;
  color:white;

  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d1d1d;
}

.menu-grid{
  display:flex;
  gap:30px;
}

.menu-btn{
  width:220px;
  height:180px;

  background:#ffffff;

  border-radius:14px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  font-size:20px;
  font-weight:600;

  cursor:pointer;

  transition:0.2s;
}

.menu-btn span{
  font-size:60px;
  margin-bottom:15px;
}

.menu-btn:hover{
  transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="menu-container">

  <h1 class="cort">
    Lançamento de Consumos
  </h1>

  <div
    id="loginBox"
    class="card-login"
  >

    <input
      id="email"
      type="email"
      placeholder="E-mail corporativo"
    >

    <button onclick="entrar()">
      Entrar
    </button>

  </div>

  <div
    id="adminOpcoes"
    class="menu-grid"
    style="display:none;"
  >

    <div
      class="menu-btn"
      onclick="irConsumo()"
    >
      <span>🥤</span>
      Registrar Consumo
    </div>

    <div
      class="menu-btn"
      onclick="irAdmin()"
    >
      <span>⚙️</span>
      Painel Admin
    </div>

  </div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

async function entrar(){

  const email =
    document
      .getElementById('email')
      .value
      .trim()
      .toLowerCase();

  console.log("EMAIL DIGITADO:", email);

  if(!email){

    alert('Informe o e-mail');

    return;
  }

  localStorage.setItem(
    'usuarioEmail',
    email
  );

  let isAdmin = false;

  try{

    const snapshot =
      await getDocs(
        collection(db, "admin_access")
      );

    console.log(
      "TOTAL DOCS:",
      snapshot.size
    );

    snapshot.forEach((documento) => {

      const dados =
        documento.data();

      console.log(
        "DOC FIREBASE:",
        dados
      );

      console.log(
        "COMPARANDO:",
        dados.email?.toLowerCase(),
        "===",
        email
      );

      console.log(
        "ATIVO:",
        dados.ativo
      );

      if(
        dados.email?.toLowerCase() === email &&
        dados.ativo === true
      ){

        console.log("ADMIN ENCONTRADO");

        isAdmin = true;
      }
    });

  }catch(err){

    console.error(err);
  }

  console.log(
    "RESULTADO FINAL:",
    isAdmin
  );

  localStorage.setItem(
    'isAdmin',
    isAdmin
  );

  if(!isAdmin){

    window.location.href =
      'index.html';

    return;
  }

  document
    .getElementById('loginBox')
    .style.display = 'none';

  document
    .getElementById('adminOpcoes')
    .style.display = 'flex';
}

function irConsumo(){

  window.location.href =
    'index.html';
}

function irAdmin(){

  window.location.href =
    'admin.html';
}

document
  .getElementById('email')
  .addEventListener(
    'keydown',
    function(e){

      if(e.key === 'Enter'){

        entrar();
      }
    }
  );
  
window.entrar = entrar;
window.irConsumo = irConsumo;
window.irAdmin = irAdmin;
</script>

</body>
</html>
