<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consumo de Bebidas</title>
<link rel="stylesheet" href="css/index.css">
</head>

<body>

  <div class="card">
    <h2>Consumo de Bebidas</h2>

    <div class="campo-data">

      <input id="data" type="date">

      <span
        id="erroData"
        class="erro-campo"
      >
        Selecione uma data
      </span>

    </div>

    <button class="btn-produtos" onclick="abrirModal()">
      Selecionar Produtos
    </button>

    <span id="erroProdutos" class="erro-campo">
      Selecione ao menos um produto
    </span>

    <div id="modalProdutos" class="modal">

      <div class="modal-content">

        <div class="modal-topo">

          <h3>
            Selecionar Produtos
          </h3>

          <button class="fechar-modal" onclick="fecharModal()">
            ✕
          </button>

        </div>

        <input type="text" id="pesquisaProduto" placeholder="Pesquisar produto...">

        <div
          id="listaProdutosModal"
          class="lista-produtos-modal"
        ></div>

        <button class="btn-concluir" onclick="concluirSelecao()">
          Concluir
        </button>

      </div>

    </div>

    <ul id="lista"></ul>

    <button class="btn-registrar" onclick="registrar()">Registrar consumo</button>

    <div id="msg" class="success"></div>
  </div>

  <script type="module">

    import { db } from "./firebase.js";

    import {
      collection,
      addDoc,
      getDocs,
      doc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

    const usuarioLogado =
      localStorage.getItem(
        'usuarioEmail'
      );

    if(!usuarioLogado){

      window.location.href =
        'login.html';
    }

    let produtosCache = [];
    let carrinho = [];

    // =====================
    // CARREGAR PRODUTOS
    // =====================
    async function carregarProdutos(){

      const querySnapshot = await getDocs(
        collection(db, "products")
      );

      produtosCache = [];

      querySnapshot.forEach((doc) => {

        const produto = {
          id: doc.id,
          ...doc.data()
        };

        produtosCache.push(produto);
      });
    }

    // =====================
    // ADICIONAR AO CARRINHO
    // =====================
    function adicionar() {
      const select = document.getElementById('bebida');
      const qtdInput = document.getElementById('quantidade');

      if (!select || !qtdInput) {
        alert('Erro interno: campos não encontrados');
        return;
      }

      const qtd = Number(qtdInput.value);

      if (!select.value) {
        alert('Selecione um produto');
        return;
      }

      if (!qtdInput.value || isNaN(qtd) || qtd <= 0) {
        alert('Informe a quantidade do produto');
        qtdInput.focus();
        return;
      }

      const id = select.value;
      const produto = produtosCache.find(p => p.id === id);

      if (!produto) {
        alert('Produto não encontrado');
        return;
      }

      const existente = carrinho.find(i => i.id === id);
      if (existente) {
        existente.quantidade += qtd;
      } else {
        carrinho.push({
          id,
          nome: produto.nome,
          preco: Number(produto.preco),
          quantidade: qtd
        });
      }

      qtdInput.value = '';
      select.value = '';
      renderCarrinho();
      document
        .getElementById('erroProdutos')
        .style.display = 'none';
    }

    // =====================
    // RENDERIZAR LISTA
    // =====================
    function renderCarrinho(){
      const ul = document.getElementById('lista');
      ul.innerHTML = '';

      carrinho.forEach((item, index) => {
        const li = document.createElement('li');

        const subtotal = item.preco * item.quantidade;

        li.innerHTML = `
          <div class="item-carrinho">
            <span class="nome-produto">${item.nome}</span>

            <span class="preco-produto">
              ${item.quantidade} x R$ ${item.preco.toFixed(2).replace('.',',')}
              = <b>R$ ${subtotal.toFixed(2).replace('.',',')}</b>
            </span>

            <button onclick="remover(${index})" class="btn-remover">x</button>
          </div>
        `;
        ul.appendChild(li);
      });
    }

    // =====================
    // REMOVER ITEM
    // =====================
    function remover(index){
      carrinho.splice(index, 1);
      renderCarrinho();
    }

    // =====================
    // REGISTRAR CONSUMO
    // =====================
    async function registrar() {

      const email =
        localStorage.getItem(
          'usuarioEmail'
        );

      const data =
        document.getElementById('data').value;

      if (!email) {
        alert('Informe o e-mail');
        return;
      }

      const campoData =
        document.getElementById('data');

      const erroData =
        document.getElementById('erroData');

      if (!data) {

        erroData.style.display = 'block';

        campoData.classList.add('input-erro');

        return;

      } else {

        erroData.style.display = 'none';

        campoData.classList.remove('input-erro');
      }

      const erroProdutos =
        document.getElementById('erroProdutos');

      if (carrinho.length === 0) {

        erroProdutos.style.display = 'block';

        return;

      } else {

        erroProdutos.style.display = 'none';
      }

      try {

        // =====================
        // VALIDAR ESTOQUE
        // =====================

        for (const item of carrinho) {

          const produtoRef =
            doc(db, "products", item.id);

          const produtoSnap =
            await getDoc(produtoRef);

          if (!produtoSnap.exists()) {
            alert(`Produto não encontrado`);
            return;
          }

          const produto =
            produtoSnap.data();

          const estoqueAtual =
            Number(produto.estoque || 0);

          if (estoqueAtual < item.quantidade) {

            alert(
              `${produto.nome} sem estoque suficiente`
            );

            return;
          }
        }

        // =====================
        // REGISTRAR + BAIXAR ESTOQUE
        // =====================

        for (const item of carrinho) {

          const produtoRef =
            doc(db, "products", item.id);

          const produtoSnap =
            await getDoc(produtoRef);

          const produto =
            produtoSnap.data();

          const estoqueAtual =
            Number(produto.estoque || 0);

          // salva consumo
          await addDoc(
            collection(db, "consumptions"),
            {
              email,
              produto: item.nome,
              preco: item.preco,
              quantidade: item.quantidade,
              produtoId: item.id,
              data: data || new Date().toISOString()
            }
          );

          // baixa estoque
          await updateDoc(produtoRef, {
            estoque:
              estoqueAtual - item.quantidade
          });
        }

        window.location.href =
          'sucesso.html';

      } catch (err) {

        console.error(err);

        alert(
          'Erro ao registrar consumo'
        );
      }
    }

    // =====================
    // DATA PICKER
    // =====================
    document.querySelectorAll('input[type="date"]').forEach(input => {
      input.addEventListener('click', () => {
        input.showPicker && input.showPicker();
      });

      input.addEventListener('focus', () => {
        input.showPicker && input.showPicker();
      });
    });

    // =====================
    // MODAL PRODUTOS
    // =====================

    let selecaoTemp = {};

    async function abrirModal(){
      await carregarProdutos();
      renderModalProdutos();

      document
        .getElementById('modalProdutos')
        .style.display = 'flex';
    }

    function fecharModal(){

      document
        .getElementById('modalProdutos')
        .style.display = 'none';
    }

    function alterarQtd(id, valor){

      if(!selecaoTemp[id]){
        selecaoTemp[id] = 0;
      }

      selecaoTemp[id] += valor;

      if(selecaoTemp[id] < 0){
        selecaoTemp[id] = 0;
      }

      renderModalProdutos();
    }

    function renderModalProdutos(){

      const lista =
        document.getElementById(
          'listaProdutosModal'
        );

      const pesquisa =
        document.getElementById(
          'pesquisaProduto'
        ).value.toLowerCase();

      lista.innerHTML = '';

      produtosCache

        .filter(p => p.ativo)

        .filter(p =>
          p.nome
            .toLowerCase()
            .includes(pesquisa)
        )

        .sort((a, b) => {

          return (a.ordem || 0) -
                 (b.ordem || 0);
        })

        .forEach(produto => {

          const qtd =
            selecaoTemp[produto.id] || 0;

          lista.innerHTML += `
            <div class="produto-modal">

              <div
                class="info-produto-tag"
                style="
                  background:
                  ${produto.cor || '#f3f5f7'};
                "
              >

                <div class="produto-textos">

                  <span class="nome-modal">
                    ${produto.nome}
                  </span>

                  <span class="preco-modal">
                    - R$ ${Number(produto.preco)
                      .toFixed(2)
                      .replace('.', ',')}
                  </span>

                </div>

              </div>

              <div class="controles-qtd">

                <button
                  class="btn-qtd"
                  onclick="alterarQtd('${produto.id}', -1)"
                >
                  -
                </button>

                <span class="qtd-produto">
                  ${qtd}
                </span>

                <button
                  class="btn-qtd"
                  onclick="alterarQtd('${produto.id}', 1)"
                >
                  +
                </button>

              </div>

            </div>
          `;
        });
    }

    function concluirSelecao(){

      Object.keys(selecaoTemp)
        .forEach(id => {

          const qtd =
            selecaoTemp[id];

          if(qtd <= 0){
            return;
          }

          const produto =
            produtosCache.find(
              p => p.id === id
            );

          if(!produto){
            return;
          }

          const existente =
            carrinho.find(
              i => i.id === id
            );

          if(existente){

            existente.quantidade += qtd;

          } else {

            carrinho.push({
              id,
              nome: produto.nome,
              preco: Number(produto.preco),
              quantidade: qtd
            });
          }
        });

      renderCarrinho();

      fecharModal();

      selecaoTemp = {};
    }

    document
      .getElementById('pesquisaProduto')
      .addEventListener(
        'input',
        renderModalProdutos
      );

    document
      .getElementById('data')
      .addEventListener('input', () => {

        document
          .getElementById('erroData')
          .style.display = 'none';

        document
          .getElementById('data')
          .classList.remove('input-erro');
      });

    window.abrirModal = abrirModal;
    window.fecharModal = fecharModal;
    window.alterarQtd = alterarQtd;
    window.concluirSelecao = concluirSelecao;

    carregarProdutos();

    window.adicionar = adicionar;
    window.registrar = registrar;
    window.remover = remover;
  </script>

</body>
</html>
