<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administração</title>

<link rel="stylesheet" href="css/admin-config.css">
</head>
<body>

<div class="card">

  <div class="topbar">

    <h2>⚙️ Administração</h2>

    <button
      onclick="location.href='admin.html'"
      class="botaomenu"
    >
      ⬅ Menu
    </button>

  </div>

  <div class="config-grid">

    <!-- ===================== -->
    <!-- CONTROLE DE ACESSOS -->
    <!-- ===================== -->

    <div
      class="config-card"
      onclick="location.href='admin-acessos.html'"
    >

      <div class="icon">
        🔐
      </div>

      <h3>
        Controle de Acessos
      </h3>

      <p>
        Gerencie os e-mails que podem acessar
        o painel administrativo.
      </p>

    </div>

    <!-- ===================== -->
    <!-- HISTÓRICO -->
    <!-- ===================== -->

    <div
      class="config-card"
      onclick="location.href='admin-logs.html'"
    >

      <div class="icon">
        📜
      </div>

      <h3>
        Histórico de Alterações
      </h3>

      <p>
        Visualize alterações realizadas
        no sistema administrativo.
      </p>

    </div>

  </div>

</div>

<script type="module">

const usuarioLogado =
  localStorage.getItem(
    'usuarioEmail'
  );

const isAdmin =
  localStorage.getItem(
    'isAdmin'
  );

if(
  !usuarioLogado ||
  isAdmin !== 'true'
){
  window.location.href =
    'login.html';
}

</script>

</body>
</html>
