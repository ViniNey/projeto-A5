<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin - Produtos</title>
<link rel="stylesheet" href="css/admin-produtos.css">
</head>
<body>

<div class="card">
  <div class="topbar">
    <h2>📦 Produtos</h2>
    <button onclick="location.href='admin.html'" class="botaomenu">⬅ Menu</button>
  </div>

  <div class="admin-container">

    <div class="col-direita">
      <p class="adprod">Adicionar produto</p>
      
      <div class="add-produto">

        <input id="novoNome" placeholder="Nome do produto">
        <input id="novoPreco" type="text">
        <button type="button" onclick="addProduto()">
          Adicionar
        </button>

      </div>

      <div class="cores-container" id="coresContainer"></div>

      <p class="prod">Produtos</p>

      <div id="produtos"></div>
      
    </div>

  </div>
  
  <button class="btn-salvar-geral" onclick="salvarTodosProdutos()">
    Salvar Alterações
  </button>

  <!-- ===================== -->
  <!-- MODAL PERSONALIZADO -->
  <!-- ===================== -->

  <div id="modalCustom" class="modal-custom">

    <div class="modal-box">

      <p id="modalTexto"></p>

      <div id="modalInputs"></div>

      <div class="modal-botoes">

        <button
          id="btnCancelarModal"
          class="btn-cancelar-modal"
        >
          Cancelar
        </button>

        <button
          id="btnConfirmarModal"
          class="btn-confirmar-modal"
        >
          Confirmar
        </button>

      </div>

    </div>

  </div>

</div>

<script type="module">
import { db } from "./firebase.js";

import { registrarLog } from "./registrarLog.js";

import {
  collection,
  getDocs,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const usuarioLogado =
  localStorage.getItem(
    'usuarioEmail'
  );

const isAdmin =
  localStorage.getItem(
    'isAdmin'
  );

if(
  !usuarioLogado ||
  isAdmin !== 'true'
){
  window.location.href =
    'login.html';
}

let corSelecionada =
  '#f3f5f7';

let coresSalvas = [];

const coresPadrao = [
  '#dbeafe',
  '#f8d7da',
  '#f7e6b5',
  '#cfeeee',
  '#d8f3d0',
  '#eadcf6',
  '#dfe3ff',
  '#f3f5f7'
];

document.addEventListener('DOMContentLoaded', () => {

  const corPadrao =
    document.querySelector(
      '.cor-opcao[data-cor="#f3f5f7"]'
    );

  if(corPadrao){

    corPadrao.classList.add(
      'selected'
    );
  }
});

// =====================
// MÁSCARA
// =====================
function aplicarMascaraMoeda(input){
  input.addEventListener('input', ()=>{
    let v = input.value.replace(/\D/g,'');
    if(v==='') v='0';
    v=(parseInt(v)/100).toFixed(2);
    v=v.replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
    input.value='R$ '+v;
  });
}

function moedaParaNumero(v){
  return Number(v.replace('R$','').replace(/\./g,'').replace(',','.'));
}

aplicarMascaraMoeda(document.getElementById('novoPreco'));
document.getElementById('novoPreco').value='R$ 0,00';

// =====================
// PRODUTOS
// =====================
function selecionarCor(elemento, cor){

  document
    .querySelectorAll('.cor-opcao')
    .forEach(el => {
      el.classList.remove('selected');
    });

  elemento.classList.add('selected');

  corSelecionada = cor;
}

// =====================
// MODAL PERSONALIZADO
// =====================

function abrirModalCustom({
  texto = '',
  mostrarCancelar = true,
  html = '',
  confirmarTexto = 'Confirmar'
}){

  return new Promise((resolve) => {

    const modal =
      document.getElementById('modalCustom');

    const textoEl =
      document.getElementById('modalTexto');

    const inputs =
      document.getElementById('modalInputs');

    const btnCancelar =
      document.getElementById('btnCancelarModal');

    const btnConfirmar =
      document.getElementById('btnConfirmarModal');

    textoEl.innerHTML = texto;

    inputs.innerHTML = html;

    btnConfirmar.textContent =
      confirmarTexto;

    btnCancelar.style.display =
      mostrarCancelar
      ? 'block'
      : 'none';

    modal.style.display = 'flex';

    btnCancelar.onclick = () => {

      modal.style.display = 'none';

      resolve(null);
    };

    btnConfirmar.onclick = () => {

      modal.style.display = 'none';

      resolve({
        confirmado: true,
        inputs: inputs
      });
    };
  });
}

async function carregarCores(){

  const container =
    document.getElementById(
      'coresContainer'
    );

  container.innerHTML = '';

  coresSalvas = [];

  // =====================
  // CORES PADRÃO
  // =====================

  coresPadrao.forEach(cor => {

    coresSalvas.push(cor);

    const wrapper =
      document.createElement('div');

    wrapper.className =
      'cor-wrapper';

    wrapper.innerHTML = `

      <button
        class="btn-remover-cor"
        onclick="removerCorPadrao('${cor}')"
      >
        ×
      </button>

      <div
        class="cor-opcao"
        data-cor="${cor}"
        style="background:${cor};"
      ></div>
    `;

    const corDiv =
      wrapper.querySelector('.cor-opcao');

    corDiv.onclick = () =>
      selecionarCor(corDiv, cor);

    container.appendChild(wrapper);
  });

  // =====================
  // CORES FIREBASE
  // =====================

  const snapshot =
    await getDocs(
      collection(db, "colors")
    );

  snapshot.forEach((documento) => {

    const cor =
      documento.data().valor;

    const id =
      documento.id;

    if(coresSalvas.includes(cor)){
      return;
    }

    coresSalvas.push(cor);

    const wrapper =
      document.createElement('div');

    wrapper.className =
      'cor-wrapper';

    wrapper.innerHTML = `

      <button
        class="btn-remover-cor"
        onclick="removerCor('${id}')"
      >
        ×
      </button>

      <div
        class="cor-opcao"
        data-cor="${cor}"
        style="background:${cor};"
      ></div>
    `;

    const corDiv =
      wrapper.querySelector('.cor-opcao');

    corDiv.onclick = () =>
      selecionarCor(corDiv, cor);

    container.appendChild(wrapper);
  });
}

function removerCorPadrao(cor){

  const index =
    coresPadrao.indexOf(cor);

  if(index > -1){

    coresPadrao.splice(index, 1);
  }

  carregarCores();
}

async function removerCor(id){

  const confirmar =
    await abrirModalCustom({
      texto: 'Excluir esta cor?'
    });

  if(!confirmar){
    return;
  }

  await deleteDoc(
    doc(db, "colors", id)
  );

  carregarCores();

  mostrarToast(
    'Cor removida',
    'sucesso'
  );
}

async function carregarProdutos(){

  const querySnapshot = await getDocs(
    collection(db, "products")
  );

  const div =
    document.getElementById('produtos');

  div.innerHTML = '';

  // TRANSFORMA EM ARRAY
  const produtos = [];

  querySnapshot.forEach((documento) => {

    produtos.push({
      id: documento.id,
      ...documento.data()
    });
  });

  // =====================
  // ORDEM DAS CORES
  // =====================

  const ordemCores = [
    '#dbeafe', // azul
    '#f8d7da', // rosa
    '#f7e6b5', // amarelo
    '#cfeeee', // verde agua
    '#d8f3d0', // verde
    '#eadcf6', // roxo
    '#dfe3ff', // lilas
    '#f3f5f7'  // cinza
  ];

  // =====================
  // ORDENA IGUAL INDEX
  // =====================

  produtos.sort((a, b) => {

    return (a.ordem || 0) -
          (b.ordem || 0);
  });

  produtos.forEach((p) => {
    if (p.exclusaoPermanente) {
      return;
    }

    const row = document.createElement('div');

    row.className = 'produto';
    row.draggable = true;

    row.dataset.id = p.id;

    row.innerHTML = `

      <div class="drag-handle">
        ☰
      </div>

      <input
        id="n${p.id}"
        value="${p.nome}"
        ${p.ativo ? '' : 'disabled'}
      >

      <input
        id="p${p.id}"
        type="text"
        ${p.ativo ? '' : 'disabled'}
      >

      <input
        type="color"
        class="input-cor"
        value="${p.cor || '#f3f5f7'}"
        ${p.ativo ? '' : 'disabled'}
      >

      ${
        p.ativo
        ? `

          <button
            type="button"
            class="btn-excluir"
            onclick="excluirProduto('${p.id}')">
            🗑️
          </button>
        `
        : `
          <button
            type="button"
            class="btn-excluir"
            onclick="reativarProduto('${p.id}')">
            ♻️
          </button>

          <button
            type="button"
            class="btn-excluir"
            onclick="excluirCompleto('${p.id}')">
            ❌
          </button>
        `
      }
    `;

    div.appendChild(row);

    row.addEventListener('dragstart', () => {
      row.classList.add('dragging');
    });

    row.addEventListener('dragend', async () => {

      row.classList.remove('dragging');

      const produtos =
        [...document.querySelectorAll('.produto')];

      for(let i = 0; i < produtos.length; i++){

        const id =
          produtos[i].dataset.id;

        await updateDoc(
          doc(db, "products", id),
          {
            ordem: i
          }
        );
      }
    });

    div.addEventListener('dragover', (e) => {

      e.preventDefault();

      const dragging =
        document.querySelector('.dragging');

      const afterElement =
        [...div.querySelectorAll('.produto:not(.dragging)')]
        .find(el => {

          const box =
            el.getBoundingClientRect();

          return e.clientY <
            box.top + box.height / 2;
        });

      if(afterElement){

        div.insertBefore(
          dragging,
          afterElement
        );

      }else{

        div.appendChild(dragging);
      }
    });

    const ip = document.getElementById('p' + p.id);

    ip.value =
      'R$ ' +
      Number(p.preco)
      .toFixed(2)
      .replace('.', ',');

    aplicarMascaraMoeda(ip);
  });
}

async function salvarTodosProdutos(){

  try{

    const cards =
      document.querySelectorAll(
        '.produto'
      );

    for(const card of cards){

      const id =
        card.dataset.id;

      const nome =
        card.querySelector(
          'input:first-of-type'
        ).value;

      const preco =
        moedaParaNumero(
          card.querySelector(
            'input:nth-of-type(2)'
          ).value
        );

      const cor =
        card.querySelector(
          '.input-cor'
        ).value;
        if(!coresSalvas.includes(cor)){

          coresSalvas.push(cor);

          await addDoc(
            collection(db, "colors"),
            {
              valor: cor
            }
          );
        }

      await updateDoc(
        doc(db, "products", id),
        {
          nome,
          preco,
          cor
        }
      );
    }

    await registrarLog(
      'EDITOU PRODUTOS',
      'Alterações gerais salvas'
    );

    mostrarToast(
      'Alterações salvas com sucesso',
      'sucesso'
    );

  }catch(err){

    console.error(err);

    mostrarToast(
      'Erro ao salvar alterações',
      'erro'
    );
  }
}

async function excluirProduto(id){
  await updateDoc(
    doc(db, "products", id),
    {
      ativo: false,
      deletadoEm: new Date().toISOString()
    }
  );

  const nomeProduto =
    document.getElementById('n' + id)?.value || id;

  await registrarLog(
    'DESATIVOU PRODUTO',
    nomeProduto
  );

  carregarProdutos();
  mostrarToast(
    'Produto desativado',
    'sucesso'
  );
}

async function reativarProduto(id){
  await updateDoc(
    doc(db, "products", id),
    {
      ativo: true,
      deletadoEm: null
    }
  );

  const nomeProduto =
    document.getElementById('n' + id)?.value || id;

  await registrarLog(
    'REATIVOU PRODUTO',
    nomeProduto
  );

  carregarProdutos();
  mostrarToast(
    'Produto reativado',
    'sucesso'
  );
}

async function addProduto(){
  const nome =
    document.getElementById('novoNome').value;
  const preco =
    moedaParaNumero(
      document.getElementById('novoPreco').value
    );

  if(!nome){
    await abrirModalCustom({
      texto: 'Informe o nome do produto',
      mostrarCancelar: false,
      confirmarTexto: 'OK'
    });
    return;
  }
  if(preco <= 0){

    await abrirModalCustom({
      texto: 'Informe um preço válido para o produto',
      mostrarCancelar: false,
      confirmarTexto: 'OK'
    });

    return;
  }
  await addDoc(
    collection(db, "products"),
    {
      nome: nome,
      preco: preco,
      ativo: true,
      estoque: 0,
      cor: corSelecionada || '#f3f5f7',
      ordem: Date.now()
    }
  );

  await registrarLog(
     'ADICIONOU PRODUTO',
     `${nome} | R$ ${preco.toFixed(2)}`
  );

  document.getElementById('novoNome').value = '';
  document.getElementById('novoPreco').value = 'R$ 0,00';

  carregarProdutos();

  mostrarToast(
    'Produto adicionado com sucesso',
    'sucesso'
  );
}

async function excluirCompleto(id){
  const confirmar =
    await abrirModalCustom({
      texto: 'Mover para exclusão permanente?'
    });

  if(!confirmar){
    return;
  }
  await updateDoc(
    doc(db, "products", id),
    {
      ativo: false,
      exclusaoPermanente: true,
      deletadoEm: new Date().toISOString()
    }
  );

  const nomeProduto =
    document.getElementById('n' + id)?.value || id;

  await registrarLog(
    'EXCLUSÃO PERMANENTE',
    nomeProduto
  );

  carregarProdutos();
  mostrarToast(
    'Produto movido para exclusão permanente',
    'sucesso'
  );
}

function mostrarToast(
  mensagem,
  tipo = 'sucesso'
){

  const container =
    document.getElementById(
      'toastContainer'
    );

  const toast =
    document.createElement('div');

  toast.className =
    `toast ${tipo}`;

  toast.textContent =
    mensagem;

  container.appendChild(toast);

  setTimeout(() => {

    toast.style.opacity = '0';

    toast.style.transform =
      'translateX(30px)';

    toast.style.transition =
      '.25s';

    setTimeout(() => {
      toast.remove();
    }, 250);

  }, 3000);
}

async function iniciar(){
  await carregarCores();
  await carregarProdutos();
}

// =====================
// APERTAR ENTER
// =====================

document
  .getElementById('novoNome')
  .addEventListener('keydown', function(e){

    if(e.key === 'Enter'){

      e.preventDefault();

      addProduto();
    }
  });

document
  .getElementById('novoPreco')
  .addEventListener('keydown', function(e){

    if(e.key === 'Enter'){

      e.preventDefault();

      addProduto();
    }
  });

iniciar();

window.removerCor = removerCor;
window.removerCorPadrao = removerCorPadrao;
window.excluirProduto = excluirProduto;
window.addProduto = addProduto;
window.reativarProduto = reativarProduto;
window.excluirCompleto = excluirCompleto;
window.salvarTodosProdutos = salvarTodosProdutos;
window.selecionarCor = selecionarCor;
</script>
<div id="toastContainer" class="toast-container"></div>
</body>
</html>
